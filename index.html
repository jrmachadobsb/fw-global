<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<script defer src="js/track.js"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .img-like {
            width: 250px;
            height: 250px;
            margin: 50px 0;
            border-radius: 50%;
        }
        
        .link-go {
            background-color: #50d80a;
            color: white;
            font-weight: bold;
            padding: 1em 1.5em;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 4px;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(80, 216, 10, 0.5);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 20px rgba(80, 216, 10, 0.8);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(80, 216, 10, 0.5);
            }
        }
    </style>
</head>

<body>
    <img class="img-like" src="https://imagedelivery.net/p1Oh6xJyueJXjNdfEd1peA/eb31fe62-38f4-470c-8728-b08dc7d62e00/public"><br>
    <!-- Texto -->

    <!-- end-->

    <!-- Link -->
    <br><br>
    <a class="link-go" href="https://review.mycloude.co.uk">CONTINUE TO PAGE</a>
</body>
</html>
